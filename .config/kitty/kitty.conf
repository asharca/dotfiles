# font_family      Maple Mono NF CN
# bold_font        Maple Mono NF CN Bold
# italic_font      Maple Mono NF CN Italic
# bold_italic_font Maple Mono NF CN BoldItalic
font_size        18
editor nvim
shell /bin/zsh
background_opacity 0.5
hide_window_decorations titlebar-only

window_padding_width 5

map cmd+b send_text all \x1bb
map cmd+f send_text all \x1bf
map cmd+d send_text all \x1bd

allow_remote_control socket-only
listen_on unix:/tmp/mykitty


# BEGIN_KITTY_FONTS
font_family      family='Maple Mono NF CN' style='Italic'
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS

# ===== Maple Mono v7.9 连字 / OpenType 特性 =====
# 文档: https://github.com/subframe7536/maple-font
# calt   连字总开关 (=> -> != >= :: <=> >> ... 官方连字表全部生效)
# 增强类: ss07=强制>>/>>>  ss08=双头/反向箭头  ss09=~=  ss10==~ !~  ss11=|= /= ?= &=
# 美化类: cv01=规范化 @ $ & % Q => ->   zero=斜杠0
# 斜体专属(更连笔手写): cv31=a cv32=f cv33=i,j cv34=k cv35=l cv36=x cv37=y
# 注: ss01/ss02/ss04/ss06 是"打断连字"特性(与连体相反),未开;需要可自行 +ssNN
# 下方覆盖所有常用字重,确保无论用哪个字重特性都生效
font_features MapleMono-NF-CN-Regular          +calt cv43
font_features MapleMono-NF-CN-Italic           +calt cv43
font_features MapleMono-NF-CN-Medium           +calt cv43
font_features MapleMono-NF-CN-MediumItalic     +calt cv43
font_features MapleMono-NF-CN-SemiBold         +calt cv43
font_features MapleMono-NF-CN-SemiBoldItalic   +calt cv43
font_features MapleMono-NF-CN-Bold             +calt cv43
font_features MapleMono-NF-CN-BoldItalic       +calt cv43
font_features MapleMono-NF-CN-ExtraBold        +calt cv43
font_features MapleMono-NF-CN-ExtraBoldItalic  +calt cv43

# Scroll & rendering performance
# Ref: https://sw.kovidgoyal.net/kitty/performance/
# Minimize latency at the cost of increased energy usage
sync_to_monitor no
input_delay 0
repaint_delay 2
wheel_scroll_multiplier 3.0
wheel_scroll_min_lines 1
touch_scroll_multiplier 1.0
scrollback_lines 5000
cursor_blink_interval 0


clipboard_control write-clipboard write-primary no-ask


# ── Appearance / 美化 ──────────────────────────────────────

# 背景毛玻璃模糊(配合 background_opacity 0.9)
background_blur 20

# 标签栏:Powerline 尖角风格,显示在底部,更紧凑
tab_bar_edge        bottom
tab_bar_style       powerline
tab_powerline_style angled
# 只有 1 个标签时隐藏标签栏(单标签时彻底不占空间)
tab_bar_min_tabs    2
tab_title_template  "{index}:{title}"

# 光标拖尾(平滑残影)
cursor_trail        1
cursor_trail_decay  0.3 0.5

# macOS 精修
macos_thicken_font  0.4
window_margin_width 0

# 关闭提示音
enable_audio_bell no


# ── Usability / 实用性 ─────────────────────────────────────

# 历史缓冲提到 2 万行
scrollback_lines        20000
# 选中即复制到系统剪贴板
copy_on_select          clipboard
# 关窗有进程时不再弹确认
confirm_os_window_close 0
# 长命令(>15s)完成且失焦时通知
notify_on_cmd_finish    unfocused 15.0 notify

# ── Coding / 编码体验 ──────────────────────────────────────

# 连字保留,光标处拆开方便编辑
disable_ligatures never
# Option 当 Alt 用(更原生)
macos_option_as_alt   yes

# ── Visual details / 视觉细节 ──────────────────────────────

# 当前标签加粗
active_tab_font_style bold
# 后台标签有输出时标记
tab_activity_symbol   "●"
# 方块光标
cursor_shape          block
# 关掉 shell 集成对光标的强制改写(否则提示符处会变竖线)
shell_integration     no-cursor
# URL 波浪下划线
url_style             curly

# ── Splits / 分屏(原生快捷键)─────────────────────────────
# 新建分屏 ⌃⇧↩ · 切换布局 ⌃⇧L · 窗口间切换 ⌃⇧] / ⌃⇧[ · 调整大小 ⌃⇧R
# kitty 默认:启用全部 7 种布局
enabled_layouts *


# ── Cool / 酷炫功能 ────────────────────────────────────────

# 动态透明度:⌃⇧A 后按 M 加 / L 减 / 1 不透明 / D 复位
dynamic_background_opacity yes

# marks 高亮:⌃⇧M 输入文字即高亮,⌃⇧⌥M 清除
map ctrl+shift+m create_marker
map ctrl+shift+alt+m remove_marker
# 预设示例:常驻高亮 error(大小写不敏感、color1)。取消注释即用:
map ctrl+shift+y toggle_marker itext 1 error


# ── More flashy UI / 更炫 UI(全内置选项)────────────────────

# 失焦分屏自动变暗(多分屏时聚焦感更强)
inactive_text_alpha 0.7

# 视觉响铃:出错时整屏柔和闪一下,带缓动
visual_bell_duration 0.25 ease-in-out
visual_bell_color #bb9af7

# 排版更透气:行高 +12%
# modify_font cell_height 112%
