# Quake 风格下拉终端配置
# 用法:绑定一个「全局热键」运行下面的命令来呼出/收起:
#   /Applications/kitty.app/Contents/MacOS/kitten quick-access-terminal
# macOS 没有原生的「命令绑全局热键」,可用 Raycast / skhd / Shortcuts.app 绑定。

# 从屏幕顶部下拉
edge top

# 高度(行数)
lines 25

# 背景透明(配合主 kitty.conf 的 background_blur 也会生效)
background_opacity 0.9

# 失焦自动隐藏
hide_on_focus_loss yes
